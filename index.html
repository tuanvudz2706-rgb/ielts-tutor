// ============ GEMINI API ============
// Dùng Pro mặc định (chất lượng cao). Tự fallback Flash khi hết quota Pro (50/ngày).
async function _callGeminiRaw(apiKey, prompt, systemInstruction, jsonMode, modelId) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`;
  const body = {
    contents: [{ role: "user", parts: [{ text: prompt }] }],
    generationConfig: { temperature: 0.4, maxOutputTokens: 4096 }
  };
  if (systemInstruction) body.systemInstruction = { parts: [{ text: systemInstruction }] };
  if (jsonMode) body.generationConfig.responseMimeType = "application/json";
  const r = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${r.status}`);
  }
  const data = await r.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

async function callGemini(apiKey, prompt, systemInstruction = null, jsonMode = false, forceModel = null) {
  // Ưu tiên Pro; nếu hết quota thì tự rơi về Flash
  const userPref = ls.get("modelPref", "auto"); // auto | pro | flash
  const preferredModel = forceModel || (userPref === "flash" ? "gemini-2.0-flash" : "gemini-2.5-pro");
  try {
    const text = await _callGeminiRaw(apiKey, prompt, systemInstruction, jsonMode, preferredModel);
    ls.set("lastModelUsed", preferredModel);
    return text;
  } catch (e) {
    const msg = (e.message || "").toLowerCase();
    const isQuota = msg.includes("quota") || msg.includes("resource") || msg.includes("rate") || msg.includes("429") || msg.includes("exceed");
    if (isQuota && preferredModel === "gemini-2.5-pro") {
      console.warn("Pro quota hết, rơi về Flash");
      ls.set("proQuotaExceededAt", Date.now());
      const text = await _callGeminiRaw(apiKey, prompt, systemInstruction, jsonMode, "gemini-2.0-flash");
      ls.set("lastModelUsed", "gemini-2.0-flash");
      return text;
    }
    throw e;
  }
}

// ============ SPEECH ============
const speak = (text, rate = 0.9) => {
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-GB"; u.rate = rate;
    const voices = window.speechSynthesis.getVoices();
    const en = voices.find(v => v.lang.startsWith("en-GB")) || voices.find(v => v.lang.startsWith("en"));
    if (en) u.voice = en;
    window.speechSynthesis.speak(u);
  } catch(e) {}
};

// ============ MAIN APP ============
function App() {
  const [screen, setScreen] = useState("home");
  const [apiKey, setApiKey] = useState("");
  const [profile, setProfile] = useState({ xp:0, streak:0, hearts:5, lastActive:null, currentBand:"3.0", completedLessons:{}, name:"" });
  const [flashcards, setFlashcards] = useState([]);
  const [currentLesson, setCurrentLesson] = useState(null);
  const [chatHistory, setChatHistory] = useState([]);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const k = ls.get("apiKey", "");
    const p = ls.get("profile", { xp:0, streak:0, hearts:5, lastActive:null, currentBand:"3.0", completedLessons:{}, name:"" });
    const f = ls.get("flashcards", []);
    const ch = ls.get("chatHistory", []);
    const today = new Date().toDateString();
    if (p.lastActive !== today) p.hearts = Math.min(5, p.hearts + 1);
    setApiKey(k);
    setProfile(p);
    setFlashcards(f);
    setChatHistory(ch);
    setLoaded(true);
  }, []);

  const saveProfile = (patch) => {
    const newP = { ...profile, ...patch, lastActive: new Date().toDateString() };
    setProfile(newP);
    ls.set("profile", newP);
  };

  const saveFlashcards = (cards) => {
    setFlashcards(cards);
    ls.set("flashcards", cards);
  };

  const saveChat = (h) => {
    setChatHistory(h);
    ls.set("chatHistory", h);
  };

  const saveApiKey = (k) => {
    setApiKey(k);
    ls.set("apiKey", k);
  };

  const completeLesson = (lessonId, score, mistakes, itemStats = []) => {
    const prev = profile.completedLessons[lessonId] || { best:0, attempts:0 };
    const today = new Date().toDateString();
    const yesterday = new Date(Date.now()-86400000).toDateString();
    const newStreak = profile.lastActive === today ? profile.streak
      : (profile.lastActive === yesterday || !profile.lastActive ? profile.streak + 1 : 1);
    
    // Aggregate stats by tag
    const tagStats = { ...(profile.tagStats || {}) };
    itemStats.forEach(s => {
      const t = s.tag || "unknown";
      if (!tagStats[t]) tagStats[t] = { attempts: 0, correctSum: 0, lastSeen: today };
      tagStats[t].attempts += 1;
      tagStats[t].correctSum += s.partial; // partial score 0-100
      tagStats[t].lastSeen = today;
    });
    
    // Daily log
    const dailyLog = { ...(profile.dailyLog || {}) };
    if (!dailyLog[today]) dailyLog[today] = { lessons: 0, avgScore: 0, items: 0, totalScore: 0 };
    dailyLog[today].lessons += 1;
    dailyLog[today].items += itemStats.length;
    dailyLog[today].totalScore += itemStats.reduce((s, i) => s + i.partial, 0);
    dailyLog[today].avgScore = Math.round(dailyLog[today].totalScore / Math.max(1, dailyLog[today].items));
    
    saveProfile({
      xp: profile.xp + Math.round(score * 0.3),
      completedLessons: { ...profile.completedLessons, [lessonId]: { best: Math.max(prev.best, score), attempts: prev.attempts+1, lastDate: today } },
      streak: newStreak,
      tagStats,
      dailyLog,
    });
    // add mistakes as flashcards
    const existing = new Set(flashcards.map(c => c.front));
    const newCards = mistakes.filter(m => !existing.has(m.front))
      .map(m => ({ ...m, id: Date.now()+Math.random(), nextDue: Date.now(), interval: 1, ease: 2.5, reps: 0 }));
    if (newCards.length) saveFlashcards([...flashcards, ...newCards]);
  };

  const addFlashcard = (card) => {
    if (!card || !card.front) return;
    if (flashcards.find(c => c.front === card.front)) return; // đã tồn tại
    const newCard = { ...card, id: Date.now()+Math.random(), nextDue: Date.now(), interval: 1, ease: 2.5, reps: 0 };
    saveFlashcards([...flashcards, newCard]);
  };

  // Calculate top weaknesses from tagStats (tags with lowest accuracy, min 5 attempts)
  const weaknesses = (() => {
    const ts = profile.tagStats || {};
    return Object.entries(ts)
      .filter(([_, v]) => v.attempts >= 5)
      .map(([tag, v]) => ({ tag, acc: Math.round(v.correctSum / v.attempts), attempts: v.attempts }))
      .sort((a, b) => a.acc - b.acc)
      .slice(0, 5);
  })();

  const reviewCard = (cardId, grade) => {
    const newCards = flashcards.map(c => {
      if (c.id !== cardId) return c;
      let { interval, ease, reps } = c;
      if (grade === 0) { interval = 1; reps = 0; ease = Math.max(1.3, ease - 0.2); }
      else if (grade === 1) { interval = Math.max(1, Math.round(interval * 1.2)); ease = Math.max(1.3, ease - 0.1); reps++; }
      else if (grade === 2) { interval = reps === 0 ? 1 : Math.round(interval * ease); reps++; }
      else { interval = reps === 0 ? 4 : Math.round(interval * ease * 1.3); ease += 0.1; reps++; }
      return { ...c, interval, ease, reps, nextDue: Date.now() + interval * 86400000 };
    });
    saveFlashcards(newCards);
  };

  if (!loaded) return <div className="paper-bg min-h-screen flex items-center justify-center"><div className="font-display italic text-stone-600">Đang mở giáo trình...</div></div>;

  if (!apiKey) return <SetupScreen onSave={saveApiKey} />;

  const due = flashcards.filter(c => c.nextDue <= Date.now());

  return (
    <div className="paper-bg min-h-screen"><div className="paper-tex min-h-screen pb-24">
      {screen === "home" && <HomeScreen profile={profile} due={due.length} apiKey={apiKey} weaknesses={weaknesses} onNav={setScreen} onStartLesson={(l) => { setCurrentLesson(l); setScreen("lesson"); }} />}
      {screen === "map" && <MapScreen profile={profile} onBack={() => setScreen("home")} onStart={(l) => { setCurrentLesson(l); setScreen("lesson"); }} onNav={setScreen} />}
      {screen === "lesson" && currentLesson && <LessonScreen lesson={currentLesson} onComplete={(score, mistakes, itemStats) => { completeLesson(currentLesson.id, score, mistakes, itemStats); setScreen("complete"); }} onQuit={() => setScreen("map")} onAddFlashcard={addFlashcard} />}
      {screen === "complete" && <CompleteScreen dueCount={due.length} onNext={() => setScreen("map")} onReview={() => setScreen("review")} />}
      {screen === "review" && <ReviewScreen cards={due} onGrade={reviewCard} onDone={() => setScreen("home")} />}
      {screen === "stats" && <StatsScreen profile={profile} flashcards={flashcards} weaknesses={weaknesses} onBack={() => setScreen("home")} />}
      {screen === "chat" && <ChatScreen apiKey={apiKey} history={chatHistory} setHistory={saveChat} profile={profile} weaknesses={weaknesses} onBack={() => setScreen("home")} />}
      {screen === "writing" && <WritingScreen apiKey={apiKey} onBack={() => setScreen("home")} onXp={(x) => saveProfile({ xp: profile.xp + x })} />}
      {screen === "ai-lesson" && <AILessonScreen apiKey={apiKey} profile={profile} weaknesses={weaknesses} onComplete={(score, mistakes, itemStats) => { completeLesson("ai-"+Date.now(), score, mistakes, itemStats); setScreen("complete"); }} onBack={() => setScreen("home")} />}
      {screen === "story" && <StoryScreen apiKey={apiKey} profile={profile} onAddFlashcard={addFlashcard} onBack={() => setScreen("home")} onXp={(x) => saveProfile({ xp: profile.xp + x })} />}
      {screen === "settings" && <SettingsScreen apiKey={apiKey} onSaveKey={saveApiKey} profile={profile} onSaveProfile={saveProfile} onBack={() => setScreen("home")} />}
      <BottomNav screen={screen} setScreen={setScreen} due={due.length} />
    </div></div>
  );
}

// ============ HELPERS FOR NEW EXERCISE TYPES ============
const normalize = (s) => String(s || "").toLowerCase().trim()
  .replace(/[\/\\]/g, "").replace(/[.,!?;:'"()]/g, "")
  .replace(/\s+/g, " ").replace(/[ː:]/g, "ː"); // IPA colon variants
const getItemType = (item, lesson) => item.type || lesson.type || "single";
const getItemTag = (item, lesson) => item.tag || `${lesson.type || "general"}_${lesson.id || ""}`;

// ============ LESSON SCREEN ============
function LessonScreen({ lesson, onComplete, onQuit, onAddFlashcard }) {
  const [idx, setIdx] = useState(0);
  const [totalScore, setTotalScore] = useState(0); // sum of % per item (max = 100 * n items)
  const [answered, setAnswered] = useState(false);
  const [itemResult, setItemResult] = useState(null); // {correct: bool, partial: 0-100, explanation, correctAnswer}
  const [selected, setSelected] = useState(null); // single/ipa/vocab/stress
  const [multiSelected, setMultiSelected] = useState(new Set()); // for multi_select
  const [fillAnswer, setFillAnswer] = useState("");
  const [mistakes, setMistakes] = useState([]); // flashcards to add
  const [shuffledOpts, setShuffledOpts] = useState([]);
  const [itemStartTime, setItemStartTime] = useState(Date.now());
  const [itemStats, setItemStats] = useState([]); // per-item analytics
  const [flashcardAdded, setFlashcardAdded] = useState(false);

  const item = lesson.items[idx];
  const itemType = getItemType(item, lesson);
  const progress = (idx / lesson.items.length) * 100;

  // Prepare shuffled options for applicable types
  useEffect(() => {
    setAnswered(false); setItemResult(null); setSelected(null);
    setMultiSelected(new Set()); setFillAnswer(""); setFlashcardAdded(false);
    setItemStartTime(Date.now());
    if (itemType === "pairs") {
      setShuffledOpts([item.target, item.distractor].sort(() => Math.random() - 0.5));
    } else if (itemType === "ipa" || itemType === "vocab" || itemType === "single" || itemType === "ipa_pick") {
      const opts = item.options || [];
      setShuffledOpts([...opts].sort(() => Math.random() - 0.5));
    } else if (itemType === "multi_select") {
      const opts = item.options || [];
      setShuffledOpts([...opts].sort(() => Math.random() - 0.5));
    }
  }, [idx]);

  // Get correct answer for comparison
  const getCorrectAnswer = () => {
    if (itemType === "ipa") return item.ipa;
    if (itemType === "vocab") return item.vi;
    if (itemType === "pairs") return item.target;
    if (itemType === "stress") return item.syllables[item.correct];
    if (itemType === "single" || itemType === "ipa_pick") return item.correct;
    if (itemType === "fill_word") return item.answer;
    if (itemType === "fill_meaning") return (item.answers || [item.vi]).join(" / ");
    return "";
  };

  // Record stats and mistake flashcard
  const recordResult = (scorePct, correctAns) => {
    const timeMs = Date.now() - itemStartTime;
    const tag = getItemTag(item, lesson);
    setItemStats(s => [...s, { tag, correct: scorePct === 100, partial: scorePct, timeMs, type: itemType }]);
    setTotalScore(s => s + scorePct);
    if (scorePct < 100) {
      let card = null;
      if (itemType === "ipa" || itemType === "ipa_pick") card = { front: item.en, back: item.ipa, type: "ipa", tag };
      else if (itemType === "vocab" || itemType === "fill_meaning") card = { front: item.en, back: `${item.ipa || ""} — ${(item.answers || [item.vi])[0]}`, type: "vocab", tag };
      else if (itemType === "fill_word") card = { front: item.ipa, back: `${item.answer} — ${item.hint || ""}`, type: "fill_word", tag };
      else if (itemType === "pairs") card = { front: item.target, back: `khác: ${item.distractor}`, type: "pair", tag };
      else if (itemType === "stress") card = { front: item.word, back: `stress: ${item.syllables[item.correct]}`, type: "stress", tag };
      else if (itemType === "single") card = { front: item.prompt || item.en || "?", back: item.correct + (item.explanation ? ` — ${item.explanation}` : ""), type: "single", tag };
      else if (itemType === "multi_select") card = { front: item.prompt, back: item.options.filter(o => o.correct).map(o => o.text).join(", "), type: "multi", tag };
      if (card && card.front) setMistakes(m => [...m, card]);
    }
  };

  // Check single answer (button-based)
  const checkSingle = (choice) => {
    if (answered) return;
    let right = false;
    if (itemType === "ipa") right = choice === item.ipa;
    else if (itemType === "vocab") right = choice === item.vi;
    else if (itemType === "pairs") right = choice === item.target;
    else if (itemType === "stress") right = choice === item.correct;
    else if (itemType === "single" || itemType === "ipa_pick") right = choice === item.correct;
    setSelected(choice); setAnswered(true);
    const score = right ? 100 : 0;
    setItemResult({ correct: right, partial: score, explanation: item.explanation || "", correctAnswer: getCorrectAnswer() });
    recordResult(score, getCorrectAnswer());
  };

  // Check multi-select: must select ALL correct and NO wrong
  const checkMulti = () => {
    if (answered) return;
    const correctSet = new Set(item.options.filter(o => o.correct).map(o => o.text));
    const selectedArr = Array.from(multiSelected);
    const correctPicked = selectedArr.filter(s => correctSet.has(s)).length;
    const wrongPicked = selectedArr.filter(s => !correctSet.has(s)).length;
    const totalCorrect = correctSet.size;
    // Score: (correctPicked - wrongPicked) / totalCorrect * 100, clamped 0-100
    let score = Math.max(0, Math.min(100, Math.round((correctPicked - wrongPicked) / totalCorrect * 100)));
    if (correctPicked === totalCorrect && wrongPicked === 0) score = 100;
    const isPerfect = score === 100;
    setAnswered(true);
    setItemResult({
      correct: isPerfect, partial: score,
      explanation: `Chọn đúng ${correctPicked}/${totalCorrect}${wrongPicked > 0 ? `, chọn sai ${wrongPicked}` : ""}`,
      correctAnswer: item.options.filter(o => o.correct).map(o => o.text).join(", ")
    });
    recordResult(score, "");
  };

  // Check fill-in
  const checkFill = () => {
    if (answered || !fillAnswer.trim()) return;
    let right = false;
    if (itemType === "fill_word") {
      right = normalize(fillAnswer) === normalize(item.answer);
    } else if (itemType === "fill_meaning") {
      const acceptable = (item.answers || [item.vi]).map(normalize);
      const userNorm = normalize(fillAnswer);
      right = acceptable.some(a => a === userNorm || a.includes(userNorm) || userNorm.includes(a));
    }
    setAnswered(true);
    const score = right ? 100 : 0;
    setItemResult({ correct: right, partial: score, explanation: "", correctAnswer: getCorrectAnswer() });
    recordResult(score, getCorrectAnswer());
  };

  const toggleMulti = (text) => {
    if (answered) return;
    const newSet = new Set(multiSelected);
    if (newSet.has(text)) newSet.delete(text); else newSet.add(text);
    setMultiSelected(newSet);
  };

  const next = () => {
    if (idx + 1 >= lesson.items.length) {
      const finalScore = Math.round(totalScore / lesson.items.length);
      onComplete(finalScore, mistakes, itemStats);
    } else {
      setIdx(idx + 1);
    }
  };

  const addCurrentToFlashcards = () => {
    let card = null;
    if (itemType === "vocab" || itemType === "fill_meaning")
      card = { front: item.en, back: `${item.ipa || ""} — ${(item.answers || [item.vi])[0]}`, type: "vocab", tag: getItemTag(item, lesson) };
    else if (itemType === "ipa" || itemType === "ipa_pick")
      card = { front: item.en, back: item.ipa, type: "ipa", tag: getItemTag(item, lesson) };
    else if (itemType === "fill_word")
      card = { front: item.answer, back: `${item.ipa} — ${item.hint || ""}`, type: "ipa", tag: getItemTag(item, lesson) };
    if (card && onAddFlashcard) {
      onAddFlashcard(card);
      setFlashcardAdded(true);
    }
  };

  const promptLabel = {
    ipa: "Chọn phiên âm đúng",
    ipa_pick: "Chọn phiên âm đúng",
    pairs: "Nghe và chọn từ đúng",
    stress: "Chọn âm tiết nhấn",
    vocab: "Chọn nghĩa tiếng Việt",
    single: "Chọn đáp án đúng",
    multi_select: "Chọn TẤT CẢ đáp án đúng",
    fill_word: "Gõ từ tiếng Anh",
    fill_meaning: "Gõ nghĩa tiếng Việt",
  }[itemType];

  const canAddFlashcard = ["vocab", "fill_meaning", "ipa", "ipa_pick", "fill_word"].includes(itemType);

  return (
    <div className="max-w-xl mx-auto px-6 pt-8 pb-40">
      <div className="flex items-center gap-4 mb-8">
        <button onClick={onQuit} className="text-stone-500"><Icon name="x" className="w-6 h-6" /></button>
        <div className="flex-1 h-2 bg-stone-200 rounded-full overflow-hidden">
          <div className="h-full bg-emerald-700 transition-all duration-500" style={{width:`${progress}%`}} />
        </div>
        <span className="font-display text-sm">{idx+1}/{lesson.items.length}</span>
      </div>

      <p className="text-xs tracking-[0.25em] text-stone-500 uppercase mb-6">{promptLabel}</p>

      {/* IPA / IPA_PICK */}
      {(itemType === "ipa" || itemType === "ipa_pick") && (
        <>
          <div className="text-center mb-8">
            <button onClick={() => speak(item.en)} className="inline-flex items-center gap-3 bg-stone-900 text-amber-50 px-6 py-4 rounded-sm ink-shadow hover:bg-stone-800 mb-6">
              <Icon name="volume" className="w-5 h-5" /><span className="font-display text-2xl italic">Nghe</span>
            </button>
            <div className="font-display text-6xl font-black">{item.en}</div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            {shuffledOpts.map((opt,i) => {
              const correctOpt = item.ipa || item.correct;
              const isSel = selected === opt, isRight = answered && opt === correctOpt, isWrong = answered && isSel && !isRight;
              return <button key={i} onClick={() => checkSingle(opt)} disabled={answered} className={`p-5 rounded-sm text-lg font-mono ink-shadow border-2 transition-all ${isRight?"bg-emerald-600 text-white border-emerald-700":isWrong?"bg-rose-100 text-rose-900 border-rose-600":isSel?"bg-stone-800 text-white":"bg-white border-stone-200 hover:border-stone-400"}`}>{opt}</button>;
            })}
          </div>
        </>
      )}

      {/* PAIRS */}
      {itemType === "pairs" && (
        <>
          <div className="text-center mb-8">
            <button onClick={() => speak(item.target, 0.7)} className="inline-flex items-center gap-3 bg-stone-900 text-amber-50 px-6 py-4 rounded-sm ink-shadow hover:bg-stone-800">
              <Icon name="volume" className="w-5 h-5" /><span className="font-display text-2xl italic">Phát lại</span>
            </button>
            {item.pair_type && <p className="text-stone-500 text-xs mt-2 font-mono">{item.pair_type}</p>}
            <p className="text-stone-500 text-sm mt-2 italic">Nghe kỹ và chọn từ đã nghe</p>
          </div>
          <div className="grid grid-cols-2 gap-3">
            {shuffledOpts.map((word,i) => {
              const isSel = selected === word, isRight = answered && word === item.target, isWrong = answered && isSel && !isRight;
              return (
                <div key={i} className={`p-6 rounded-sm ink-shadow border-2 transition-all ${isRight?"bg-emerald-600 text-white border-emerald-700":isWrong?"bg-rose-100 text-rose-900 border-rose-600":isSel?"bg-stone-800 text-white":"bg-white border-stone-200"}`}>
                  <button onClick={() => checkSingle(word)} disabled={answered} className="w-full font-display text-3xl font-bold">{word}</button>
                  <button onClick={() => speak(word)} className="mt-2 text-xs underline opacity-70 hover:opacity-100 flex items-center gap-1 mx-auto"><Icon name="volume" className="w-3 h-3" /> nghe riêng</button>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* STRESS */}
      {itemType === "stress" && (
        <>
          <div className="text-center mb-8">
            <button onClick={() => speak(item.word)} className="inline-flex items-center gap-3 bg-stone-900 text-amber-50 px-6 py-4 rounded-sm ink-shadow hover:bg-stone-800 mb-6">
              <Icon name="volume" className="w-5 h-5" /><span className="font-display text-2xl italic">Nghe phát âm</span>
            </button>
            <div className="font-display text-5xl font-black">{item.word}</div>
          </div>
          <p className="text-center text-stone-500 text-sm mb-4 italic">Âm tiết nào được nhấn mạnh?</p>
          <div className="flex gap-3 flex-wrap justify-center">
            {item.syllables.map((syl,i) => {
              const isSel = selected === i, isRight = answered && i === item.correct, isWrong = answered && isSel && !isRight;
              return <button key={i} onClick={() => checkSingle(i)} disabled={answered} className={`px-8 py-5 rounded-sm font-display text-3xl font-bold ink-shadow border-2 transition-all ${isRight?"bg-emerald-600 text-white border-emerald-700":isWrong?"bg-rose-100 text-rose-900 border-rose-600":isSel?"bg-stone-800 text-white":"bg-white border-stone-200 hover:border-stone-400"}`}>{syl}</button>;
            })}
          </div>
        </>
      )}

      {/* VOCAB (cứng) */}
      {itemType === "vocab" && (
        <>
          <div className="bg-white border border-stone-200 rounded-sm p-6 ink-shadow mb-6 text-center">
            <div className="font-display text-5xl font-black mb-2">{item.en}</div>
            <div className="font-mono text-amber-700 text-lg mb-3">{item.ipa}</div>
            <button onClick={() => speak(item.en)} className="inline-flex items-center gap-2 text-stone-600 hover:text-stone-900 text-sm"><Icon name="volume" className="w-4 h-4" /> Nghe</button>
          </div>
          <div className="space-y-2">
            {shuffledOpts.map((opt,i) => {
              const isSel = selected === opt, isRight = answered && opt === item.vi, isWrong = answered && isSel && !isRight;
              return <button key={i} onClick={() => checkSingle(opt)} disabled={answered} className={`w-full p-4 rounded-sm text-left ink-shadow border-2 transition-all ${isRight?"bg-emerald-600 text-white border-emerald-700":isWrong?"bg-rose-100 text-rose-900 border-rose-600":isSel?"bg-stone-800 text-white":"bg-white border-stone-200 hover:border-stone-400"}`}>{opt}</button>;
            })}
          </div>
        </>
      )}

      {/* SINGLE (AI generated với prompt) */}
      {itemType === "single" && (
        <>
          {item.en && (
            <div className="bg-white border border-stone-200 rounded-sm p-6 ink-shadow mb-4 text-center">
              <div className="font-display text-4xl font-black mb-1">{item.en}</div>
              {item.ipa && <div className="font-mono text-amber-700 mb-2">{item.ipa}</div>}
              <button onClick={() => speak(item.en)} className="inline-flex items-center gap-2 text-stone-600 text-sm"><Icon name="volume" className="w-4 h-4" /> Nghe</button>
            </div>
          )}
          {item.prompt && <p className="font-display text-xl leading-relaxed mb-6 text-center">{item.prompt}</p>}
          <div className="space-y-2">
            {shuffledOpts.map((opt,i) => {
              const isSel = selected === opt, isRight = answered && opt === item.correct, isWrong = answered && isSel && !isRight;
              return <button key={i} onClick={() => checkSingle(opt)} disabled={answered} className={`w-full p-4 rounded-sm text-left ink-shadow border-2 transition-all ${isRight?"bg-emerald-600 text-white border-emerald-700":isWrong?"bg-rose-100 text-rose-900 border-rose-600":isSel?"bg-stone-800 text-white":"bg-white border-stone-200 hover:border-stone-400"}`}>{opt}</button>;
            })}
          </div>
        </>
      )}

      {/* MULTI_SELECT */}
      {itemType === "multi_select" && (
        <>
          <div className="bg-amber-50 border border-amber-200 rounded-sm p-3 mb-4 text-xs text-amber-900 text-center">
            ⚠ Chọn TẤT CẢ đáp án đúng. Sót hoặc chọn dư → điểm một phần.
          </div>
          <p className="font-display text-xl leading-relaxed mb-6 text-center">{item.prompt}</p>
          <div className="space-y-2">
            {shuffledOpts.map((opt, i) => {
              const text = opt.text;
              const isChecked = multiSelected.has(text);
              const isRight = answered && opt.correct;
              const isWrong = answered && isChecked && !opt.correct;
              const missed = answered && !isChecked && opt.correct;
              return (
                <button key={i} onClick={() => toggleMulti(text)} disabled={answered} className={`w-full p-4 rounded-sm text-left ink-shadow border-2 transition-all flex items-center gap-3 ${
                  isRight && isChecked ? "bg-emerald-600 text-white border-emerald-700" :
                  isWrong ? "bg-rose-100 text-rose-900 border-rose-600" :
                  missed ? "bg-amber-100 text-amber-900 border-amber-600" :
                  isChecked ? "bg-stone-800 text-white" :
                  "bg-white border-stone-200 hover:border-stone-400"
                }`}>
                  <div className={`w-5 h-5 rounded-sm border-2 flex items-center justify-center ${isChecked || (answered && opt.correct) ? "bg-current" : ""}`}>
                    {(isChecked || (answered && opt.correct)) && <Icon name="check" className="w-3 h-3" />}
                  </div>
                  <span className="flex-1">{text}</span>
                  {missed && <span className="text-xs italic">(bị bỏ sót)</span>}
                </button>
              );
            })}
          </div>
          {!answered && (
            <button onClick={checkMulti} disabled={multiSelected.size === 0} className="w-full mt-4 bg-stone-900 text-amber-50 py-3 rounded-sm font-bold disabled:opacity-50">Nộp ({multiSelected.size} đã chọn)</button>
          )}
        </>
      )}

      {/* FILL_WORD - cho IPA, gõ từ */}
      {itemType === "fill_word" && (
        <>
          <div className="bg-white border border-stone-200 rounded-sm p-6 ink-shadow mb-4 text-center">
            <p className="text-xs uppercase tracking-widest text-stone-500 mb-2">Phiên âm</p>
            <div className="font-mono text-4xl text-amber-700 mb-2">{item.ipa}</div>
            {item.hint && <p className="text-sm text-stone-500 italic">Gợi ý nghĩa: {item.hint}</p>}
          </div>
          <input type="text" value={fillAnswer} onChange={e => setFillAnswer(e.target.value)} onKeyDown={e => e.key === "Enter" && checkFill()} disabled={answered} placeholder="Gõ từ tiếng Anh..." className={`w-full p-4 border-2 rounded-sm font-display text-2xl text-center focus:outline-none ${answered ? (itemResult?.correct ? "border-emerald-600 bg-emerald-50" : "border-rose-600 bg-rose-50") : "border-stone-300 focus:border-stone-700"}`} autoFocus />
          {!answered && <button onClick={checkFill} disabled={!fillAnswer.trim()} className="w-full mt-4 bg-stone-900 text-amber-50 py-3 rounded-sm font-bold disabled:opacity-50">Kiểm tra</button>}
        </>
      )}

      {/* FILL_MEANING - cho từ + IPA, gõ nghĩa */}
      {itemType === "fill_meaning" && (
        <>
          <div className="bg-white border border-stone-200 rounded-sm p-6 ink-shadow mb-4 text-center">
            <div className="font-display text-5xl font-black mb-2">{item.en}</div>
            {item.ipa && <div className="font-mono text-amber-700 text-lg mb-3">{item.ipa}</div>}
            <button onClick={() => speak(item.en)} className="inline-flex items-center gap-2 text-stone-600 text-sm"><Icon name="volume" className="w-4 h-4" /> Nghe</button>
          </div>
          <input type="text" value={fillAnswer} onChange={e => setFillAnswer(e.target.value)} onKeyDown={e => e.key === "Enter" && checkFill()} disabled={answered} placeholder="Gõ nghĩa tiếng Việt..." className={`w-full p-4 border-2 rounded-sm text-xl text-center focus:outline-none ${answered ? (itemResult?.correct ? "border-emerald-600 bg-emerald-50" : "border-rose-600 bg-rose-50") : "border-stone-300 focus:border-stone-700"}`} autoFocus />
          {!answered && <button onClick={checkFill} disabled={!fillAnswer.trim()} className="w-full mt-4 bg-stone-900 text-amber-50 py-3 rounded-sm font-bold disabled:opacity-50">Kiểm tra</button>}
        </>
      )}

      {/* FEEDBACK FOOTER */}
      {answered && itemResult && (
        <div className={`fixed bottom-0 left-0 right-0 p-4 slide-up ${itemResult.correct?"bg-emerald-50 border-t-2 border-emerald-700":itemResult.partial > 0 ? "bg-amber-50 border-t-2 border-amber-600" : "bg-rose-50 border-t-2 border-rose-700"}`}>
          <div className="max-w-xl mx-auto">
            <div className="flex items-start justify-between gap-4 mb-2">
              <div className="flex-1">
                <div className={`font-display text-xl font-bold ${itemResult.correct?"text-emerald-800":itemResult.partial > 0 ? "text-amber-800" : "text-rose-800"}`}>
                  {itemResult.correct ? "Tuyệt vời! 100%" : itemResult.partial > 0 ? `Đúng một phần: ${itemResult.partial}%` : "Chưa đúng"}
                </div>
                {!itemResult.correct && <div className="text-sm mt-1"><span className="text-stone-600">Đáp án đúng: </span><b className="font-mono">{itemResult.correctAnswer}</b></div>}
                {itemResult.explanation && <div className="text-xs text-stone-600 italic mt-1">{itemResult.explanation}</div>}
                {item.explanation && <div className="text-xs text-stone-700 italic mt-1">💡 {item.explanation}</div>}
              </div>
              <button onClick={next} className={`px-6 py-3 rounded-sm font-bold ink-shadow flex-shrink-0 ${itemResult.correct?"bg-emerald-700 text-white":itemResult.partial > 0 ? "bg-amber-700 text-white" : "bg-rose-700 text-white"}`}>
                {idx+1 >= lesson.items.length ? "Hoàn thành" : "Tiếp →"}
              </button>
            </div>
            {canAddFlashcard && onAddFlashcard && (
              <button onClick={addCurrentToFlashcards} disabled={flashcardAdded} className="text-xs text-stone-600 hover:text-stone-900 underline disabled:opacity-50 disabled:no-underline">
                {flashcardAdded ? "✓ Đã thêm vào flashcards" : "+ Thêm từ này vào flashcards để ôn sau"}
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ============ COMPLETE ============
function CompleteScreen({ dueCount, onNext, onReview }) {
  return (
    <div className="max-w-xl mx-auto px-6 pt-10 min-h-[80vh] flex flex-col items-center justify-center text-center slide-up">
      <div className="float-gentle mb-6"><Icon name="trophy" className="w-24 h-24 text-amber-600" /></div>
      <p className="text-xs tracking-[0.3em] uppercase text-stone-500 mb-2">Chương hoàn tất</p>
      <h1 className="font-display text-6xl font-black mb-3">Xuất sắc.</h1>
      <p className="font-display italic text-xl text-stone-600 max-w-md mb-10">Những từ bạn quên đã được ghi vào flashcards để ôn lại.</p>
      <div className="flex flex-col gap-3 w-full max-w-xs">
        <button onClick={onNext} className="bg-stone-900 text-amber-50 py-4 rounded-sm font-display text-lg font-bold ink-shadow hover:bg-stone-800">Bài tiếp theo</button>
        {dueCount > 0 && <button onClick={onReview} className="bg-white border-2 border-amber-700 text-amber-800 py-4 rounded-sm font-display italic">Ôn {dueCount} flashcards trước</button>}
      </div>
    </div>
  );
}

// ============ REVIEW ============
function ReviewScreen({ cards, onGrade, onDone }) {
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [localCards] = useState(cards);

  if (localCards.length === 0) return (
    <div className="max-w-xl mx-auto px-6 pt-20 text-center">
      <Icon name="sparkle" className="w-16 h-16 text-amber-600 mx-auto mb-4" />
      <h1 className="font-display text-4xl font-black mb-3">Không có thẻ đến hạn</h1>
      <p className="text-stone-600 mb-8">Học thêm bài để tạo flashcards mới</p>
      <button onClick={onDone} className="bg-stone-900 text-amber-50 px-8 py-3 rounded-sm">Về trang chính</button>
    </div>
  );

  if (idx >= localCards.length) return (
    <div className="max-w-xl mx-auto px-6 pt-20 text-center slide-up">
      <Icon name="trophy" className="w-20 h-20 text-emerald-700 mx-auto mb-4" />
      <h1 className="font-display text-4xl font-black mb-3">Hoàn thành ôn tập</h1>
      <p className="text-stone-600 mb-8">{localCards.length} thẻ đã được cập nhật.</p>
      <button onClick={onDone} className="bg-stone-900 text-amber-50 px-8 py-3 rounded-sm font-bold">Về trang chính</button>
    </div>
  );

  const card = localCards[idx];
  const grade = (g) => { onGrade(card.id, g); setFlipped(false); setIdx(idx+1); };

  return (
    <div className="max-w-xl mx-auto px-6 pt-10">
      <div className="flex items-center gap-4 mb-8">
        <button onClick={onDone} className="text-stone-500"><Icon name="x" className="w-6 h-6" /></button>
        <div className="flex-1 h-2 bg-stone-200 rounded-full overflow-hidden">
          <div className="h-full bg-amber-700 transition-all" style={{width:`${(idx/localCards.length)*100}%`}} />
        </div>
        <span className="font-display text-sm">{idx+1}/{localCards.length}</span>
      </div>
      <p className="text-xs tracking-[0.3em] uppercase text-stone-500 mb-4 text-center">Flashcard — {card.type}</p>
      <div onClick={() => setFlipped(!flipped)} className="bg-white border border-stone-200 rounded-sm p-12 ink-shadow cursor-pointer min-h-[280px] flex flex-col items-center justify-center mb-6">
        {!flipped ? (
          <>
            <div className="font-display text-5xl font-black mb-4">{card.front}</div>
            <button onClick={(e) => { e.stopPropagation(); speak(card.front); }} className="inline-flex items-center gap-2 text-stone-500 hover:text-stone-900 text-sm"><Icon name="volume" className="w-4 h-4" /> nghe</button>
            <p className="text-xs text-stone-400 italic mt-8">chạm để lật</p>
          </>
        ) : (
          <div className="text-center slide-up"><div className="font-display text-3xl font-bold text-amber-800">{card.back}</div></div>
        )}
      </div>
      {flipped && (
        <div className="grid grid-cols-4 gap-2 slide-up">
          <button onClick={() => grade(0)} className="bg-rose-700 text-white py-3 rounded-sm font-bold hover:bg-rose-800">Quên</button>
          <button onClick={() => grade(1)} className="bg-amber-600 text-white py-3 rounded-sm font-bold hover:bg-amber-700">Khó</button>
          <button onClick={() => grade(2)} className="bg-emerald-700 text-white py-3 rounded-sm font-bold hover:bg-emerald-800">Được</button>
          <button onClick={() => grade(3)} className="bg-stone-900 text-amber-50 py-3 rounded-sm font-bold hover:bg-stone-800">Dễ</button>
        </div>
      )}
    </div>
  );
}

// ============ CHAT SCREEN ============
function ChatScreen({ apiKey, history, setHistory, profile, onBack }) {
  const [input, setInput] = useState("");
  const [sending, setSending] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({behavior:"smooth"}); }, [history, sending]);

  const send = async () => {
    if (!input.trim() || sending) return;
    const userMsg = { role: "user", text: input.trim() };
    const newHist = [...history, userMsg];
    setHistory(newHist);
    setInput("");
    setSending(true);
    try {
      const context = `Học viên: Band ${profile.currentBand}, streak ${profile.streak} ngày.
Lịch sử: ${newHist.slice(-6).map(m => `${m.role}: ${m.text}`).join("\n")}

Trả lời tin nhắn mới nhất của học viên, giữ câu trả lời ngắn gọn.`;
      const resp = await callGemini(apiKey, context, CO_MINH_SYSTEM);
      setHistory([...newHist, { role: "assistant", text: resp }]);
    } catch(e) {
      setHistory([...newHist, { role: "assistant", text: "Xin lỗi, cô bị lỗi kết nối. Kiểm tra API key và thử lại nhé. Lỗi: " + e.message }]);
    }
    setSending(false);
  };

  const clear = () => { if (confirm("Xóa toàn bộ lịch sử chat?")) setHistory([]); };

  return (
    <div className="max-w-xl mx-auto px-6 pt-10 pb-32">
      <div className="flex items-center justify-between mb-6">
        <button onClick={onBack} className="text-stone-500 flex items-center gap-1 text-sm"><Icon name="chevLeft" className="w-4 h-4" /> Trang chính</button>
        {history.length > 0 && <button onClick={clear} className="text-stone-400 hover:text-rose-700 text-xs">Xóa lịch sử</button>}
      </div>
      <div className="mb-6">
        <p className="text-xs tracking-[0.3em] uppercase text-stone-500 mb-1">Hỏi đáp</p>
        <h1 className="font-display text-4xl font-black">Chat với Cô Minh</h1>
      </div>

      <div className="space-y-4 mb-6 min-h-[200px]">
        {history.length === 0 && (
          <div className="bg-amber-50 border border-amber-200 rounded-sm p-4 slide-up">
            <p className="font-display italic text-stone-700">Chào em! Em có câu hỏi gì về IELTS? Cô có thể giải thích ngữ pháp, chấm câu em viết, hoặc luyện Speaking cùng em. 📚</p>
          </div>
        )}
        {history.map((m, i) => (
          <div key={i} className={`slide-up ${m.role === "user" ? "flex justify-end" : ""}`}>
            <div className={`max-w-[85%] p-4 rounded-sm ${m.role === "user" ? "bg-stone-900 text-amber-50" : "bg-white border border-stone-200 ink-shadow"}`}>
              <p className={m.role === "user" ? "" : "font-display"} style={{whiteSpace:"pre-wrap"}}>{m.text}</p>
            </div>
          </div>
        ))}
        {sending && <div className="bg-white border border-stone-200 rounded-sm p-4 max-w-[85%] ink-shadow"><p className="typing text-stone-500 font-display italic">Cô đang suy nghĩ</p></div>}
        <div ref={endRef} />
      </div>

      <div className="fixed bottom-16 left-0 right-0 bg-stone-50/95 backdrop-blur border-t border-stone-300 p-4">
        <div className="max-w-xl mx-auto flex gap-2">
          <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && send()} placeholder="Hỏi cô về ngữ pháp, từ vựng, Writing..." className="flex-1 px-4 py-3 border border-stone-300 rounded-sm focus:outline-none focus:border-stone-700" />
          <button onClick={send} disabled={sending} className="bg-stone-900 text-amber-50 px-5 rounded-sm hover:bg-stone-800 disabled:opacity-50 flex items-center gap-2">
            <Icon name="send" className="w-4 h-4" />
          </button>
        </div>
      </div>
    </div>
  );
}

function WritingScreen({ apiKey, onBack, onXp }) {
  const [prompt, setPrompt] = useState(null);
  const [essay, setEssay] = useState("");
  const [grading, setGrading] = useState(false);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  const genPrompt = async () => {
    setLoading(true); setPrompt(null); setResult(null); setEssay("");
    try {
      const r = await callGemini(apiKey,
        `Sinh 1 đề IELTS Writing Task 2 ngẫu nhiên, band ~5.5-6.0.
Trả về JSON đúng format:
{ "topic": "...", "prompt": "câu đề bài đầy đủ bằng tiếng Anh", "vi": "dịch tiếng Việt ngắn" }`,
        null, true);
      const data = JSON.parse(r);
      setPrompt(data);
    } catch(e) { alert("Lỗi: " + e.message); }
    setLoading(false);
  };

  const grade = async () => {
    if (essay.trim().split(/\s+/).length < 50) { alert("Viết tối thiểu 50 từ"); return; }
    setGrading(true);
    try {
      const wordCount = essay.trim().split(/\s+/).length;
      const r = await callGemini(apiKey,
        `Bạn là giám khảo IELTS có chứng chỉ Cambridge, chấm chính xác theo band descriptor 2024.

ĐỀ BÀI:
${prompt.prompt}

BÀI LÀM CỦA HỌC VIÊN (${wordCount} từ):
${essay}

YÊU CẦU CHẤM:
1. Chấm thật, không nâng điểm. Nếu bài band 4.5 thì chấm 4.5, không lên 5.5.
2. Với mỗi tiêu chí, chỉ ra VỊ TRÍ CỤ THỂ trong bài (trích dẫn câu, dòng) thay vì nhận xét chung.
3. List lỗi: ít nhất 4-6 lỗi quan trọng nhất (ngữ pháp + lexical + coherence). Với mỗi lỗi đưa: câu gốc, câu sửa, giải thích quy tắc.
4. Gợi ý: không nói chung chung, mà đưa 3 hành động cụ thể (ví dụ: "thay 'very important' bằng 'crucial/essential'", "dùng 'furthermore' thay vì lặp 'and'").
5. Thêm 1 câu VIẾT LẠI BAND 6.5: chọn 1 câu trong bài viết lại ở level band 6.5 để học viên học theo.

Trả về JSON đúng format này:
{
  "overall_band": 5.5,
  "word_count_ok": true,
  "task_response": { "band": 6.0, "comment": "nhận xét cụ thể tiếng Việt, trích dẫn câu từ bài" },
  "coherence": { "band": 5.5, "comment": "..." },
  "lexical": { "band": 5.0, "comment": "..." },
  "grammar": { "band": 5.5, "comment": "..." },
  "top_errors": [
    { "wrong": "câu gốc sai trong bài", "correct": "câu đã sửa", "explanation": "giải thích quy tắc ngắn tiếng Việt", "type": "grammar|lexical|coherence" }
  ],
  "rewrite_sample": { "original": "câu gốc từ bài", "band_65": "cùng ý viết lại ở band 6.5", "note": "giải thích tại sao câu band 6.5 tốt hơn" },
  "strengths": "1-2 câu nêu điểm MẠNH của bài (tiếng Việt)",
  "suggestions": "3 gợi ý hành động cụ thể (tiếng Việt, dùng gạch đầu dòng bằng - )"
}`,
        null, true);
      const data = JSON.parse(r);
      setResult(data);
      onXp(30);
    } catch(e) { alert("Lỗi chấm: " + e.message + "\n\nNếu lỗi 'quota exceeded' nghĩa là đã dùng hết cả Pro (50/ngày) và Flash (1500/ngày). Đợi mai reset."); }
    setGrading(false);
  };

  return (
    <div className="max-w-xl mx-auto px-6 pt-10 pb-20">
      <button onClick={onBack} className="mb-6 text-stone-500 flex items-center gap-1 text-sm"><Icon name="chevLeft" className="w-4 h-4" /> Trang chính</button>
      <h1 className="font-display text-4xl font-black mb-2">IELTS Writing Task 2</h1>
      <p className="text-stone-500 text-sm mb-2">AI chấm theo 4 tiêu chí Cambridge</p>
      <div className="inline-flex items-center gap-2 text-xs bg-stone-900 text-amber-50 px-3 py-1 rounded-sm mb-8">
        <Icon name="sparkle" className="w-3 h-3" />
        <span>Gemini 2.5 Pro · 50 bài/ngày miễn phí</span>
      </div>

      {!prompt && (
        <button onClick={genPrompt} disabled={loading} className="w-full bg-stone-900 text-amber-50 p-6 rounded-sm ink-shadow font-display text-xl font-bold hover:bg-stone-800 disabled:opacity-50">
          {loading ? "Đang tạo đề..." : "Sinh đề bài mới"}
        </button>
      )}

      {prompt && !result && (
        <>
          <div className="bg-white border border-stone-200 rounded-sm p-6 ink-shadow mb-4">
            <p className="text-xs tracking-widest uppercase text-stone-500 mb-2">Chủ đề: {prompt.topic}</p>
            <p className="font-display text-lg leading-relaxed mb-3">{prompt.prompt}</p>
            <p className="text-sm text-stone-600 italic">{prompt.vi}</p>
          </div>

          <textarea value={essay} onChange={e => setEssay(e.target.value)} placeholder="Bắt đầu viết..." className="w-full min-h-[300px] p-4 border border-stone-300 rounded-sm font-body focus:outline-none focus:border-stone-700" />
          <div className="flex items-center justify-between mt-2 mb-4">
            <span className="text-sm text-stone-500">{essay.trim().split(/\s+/).filter(Boolean).length} từ</span>
            <button onClick={grade} disabled={grading} className="bg-emerald-700 text-white px-6 py-3 rounded-sm font-bold hover:bg-emerald-800 disabled:opacity-50">
              {grading ? "Đang chấm..." : "Nộp bài cho cô chấm"}
            </button>
          </div>
        </>
      )}

      {result && (
        <div className="slide-up">
          <div className="bg-stone-900 text-amber-50 p-8 rounded-sm ink-shadow mb-4 text-center relative overflow-hidden">
            <div className="absolute top-2 right-3 text-[10px] tracking-widest uppercase text-amber-400/50">Gemini 2.5 Pro</div>
            <p className="text-xs tracking-[0.3em] uppercase text-amber-400/70 mb-2">Band Overall</p>
            <div className="font-display text-7xl font-black">{result.overall_band}</div>
            {result.word_count_ok === false && <p className="text-rose-300 text-xs mt-2">⚠ Dưới 250 từ — band bị trừ</p>}
          </div>
          {result.strengths && (
            <div className="bg-emerald-50 border border-emerald-200 rounded-sm p-4 mb-3">
              <h3 className="font-display font-bold text-emerald-900 mb-1 flex items-center gap-2">
                <Icon name="check" className="w-4 h-4" /> Điểm mạnh của bài
              </h3>
              <p className="text-sm text-emerald-900 font-display italic">{result.strengths}</p>
            </div>
          )}
          {["task_response","coherence","lexical","grammar"].map(k => {
            const labels = { task_response:"Task Response", coherence:"Coherence & Cohesion", lexical:"Lexical Resource", grammar:"Grammar" };
            return (
              <div key={k} className="bg-white border border-stone-200 rounded-sm p-4 ink-shadow mb-3">
                <div className="flex justify-between items-baseline mb-2">
                  <h3 className="font-display font-bold">{labels[k]}</h3>

          })}
          {result.top_errors?.length > 0 && (
            <div className="bg-rose-50 border border-rose-200 rounded-sm p-4 mb-3">
              <h3 className="font-display font-bold text-rose-900 mb-3">Lỗi cần sửa ({result.top_errors.length})</h3>
              <div className="space-y-3">
                {result.top_errors.map((e,i) => (
                  <div key={i} className="text-sm pb-2 border-b border-rose-200 last:border-0">
                    {e.type && <span className="inline-block text-[10px] px-2 py-0.5 rounded-sm bg-rose-200 text-rose-900 uppercase tracking-wider mb-1">{e.type}</span>}
                    <div className="mb-1"><s className="text-rose-700">{e.wrong}</s></div>

                <div><span className="text-xs text-stone-500 uppercase tracking-wider">Bài bạn viết:</span><div className="italic text-stone-700">"{result.rewrite_sample.original}"</div></div>

                {result.rewrite_sample.note && <div className="text-xs text-stone-600 italic pt-2 border-t border-blue-200">💡 {result.rewrite_sample.note}</div>}

            <h3 className="font-display font-bold text-amber-900 mb-2">Gợi ý từ cô</h3>

// ============ AI LESSON SCREEN ============
function AILessonScreen({ apiKey, profile, weaknesses, onComplete, onBack }) {
  const [topic, setTopic] = useState("");
  const [lessonType, setLessonType] = useState("vocab_mixed");
  const [lesson, setLesson] = useState(null);
  const [loading, setLoading] = useState(false);
  const topics = ["Environment","Technology","Health","Education","Work","Travel","Food","Family","Sports","Media","Random"];

  const weaknessHint = weaknesses.length > 0
    ? `Học viên đang YẾU ở: ${weaknesses.slice(0,3).map(w => w.tag + ` (${w.acc}%)`).join(", ")}. Ưu tiên bài tập tập trung vào các điểm yếu này.`
    : "";

  const gen = async (t) => {
    setLoading(true); setTopic(t);
    try {
      let promptText = "";

      if (lessonType === "vocab_mixed") {
        promptText = `Tạo 1 bài học từ vựng IELTS chủ đề "${t}" cho học viên band ${profile.currentBand}. ${weaknessHint}

Tạo 8 items với CÁC LOẠI BÀI TẬP KHÁC NHAU trộn lẫn:
- 3 items loại "single" (chọn 1 đáp án đúng về nghĩa)
- 2 items loại "multi_select" (chọn nhiều đáp án đúng — ví dụ: "Những từ nào là synonym của X?")
- 2 items loại "fill_word" (cho phiên âm, gõ từ)
- 1 item loại "fill_meaning" (cho từ + IPA, gõ nghĩa tiếng Việt)

JSON format chính xác:
{
  "title": "${t} vocabulary",
  "items": [
    {"type":"single","en":"word","ipa":"/ipa/","vi":"nghĩa","options":["đáp đúng","sai 1","sai 2","sai 3"],"correct":"đáp đúng","tag":"vocab_${t.toLowerCase()}"},
    {"type":"multi_select","prompt":"Từ nào là synonym của 'important'?","options":[{"text":"crucial","correct":true},{"text":"trivial","correct":false},{"text":"essential","correct":true},{"text":"optional","correct":false},{"text":"vital","correct":true}],"tag":"vocab_synonym"},
    {"type":"fill_word","ipa":"/ˌsʌsteɪnəbl/","answer":"sustainable","hint":"bền vững","tag":"vocab_${t.toLowerCase()}"},
    {"type":"fill_meaning","en":"mitigate","ipa":"/ˈmɪtɪɡeɪt/","answers":["giảm nhẹ","giảm thiểu","làm nhẹ đi"],"tag":"vocab_${t.toLowerCase()}"}
  ]
}

QUAN TRỌNG về chất lượng:
- Single: options[0] = đáp án đúng, 3 distractors phải HỢP LÝ (cùng phạm vi ngữ nghĩa, dễ nhầm)
- Multi-select: có 5-6 options, 2-3 correct, các options còn lại phải là distractor khó
- Fill word: IPA chuẩn British RP
- Fill meaning: "answers" là mảng 2-3 cách diễn đạt nghĩa tiếng Việt đều chấp nhận được`;

      } else if (lessonType === "ipa_drill") {
        promptText = `Tạo 1 bài tập IPA khó cho học viên band ${profile.currentBand}. Chủ đề từ vựng: "${t}". ${weaknessHint}

Tạo 8 items với loại "ipa_pick" (chọn phiên âm đúng):
- Từ phải có 2-3 âm tiết hoặc có âm khó (/θ/, /ð/, /ʃ/, /ʒ/, /dʒ/, schwa /ə/, diphthongs)
- Distractors PHẢI KHÁC ĐÁP ÁN ĐÚNG CHỈ 1 ÂM DUY NHẤT (giống DailyDictation) để làm học viên phải nghe/phân biệt kỹ

Ví dụ với từ "thought" /θɔːt/, distractors phải là:
  ✓ "/θɔːt/" (đúng)
  × "/sɔːt/" (thay /θ/→/s/ - âm đầu gần)
  × "/θɒt/" (thay /ɔː/→/ɒ/ - vowel length)
  × "/fɔːt/" (thay /θ/→/f/ - người Việt hay nhầm)

KHÔNG được dùng distractor khác quá xa như "/bɔːt/" hay "/miː/" — như thế quá dễ.

JSON format:
{
  "title": "IPA Drill: ${t}",
  "items": [
    {"type":"ipa_pick","en":"word","ipa":"/correct_ipa/","options":["/correct/","/near1/","/near2/","/near3/"],"correct":"/correct/","tag":"ipa_vowel|ipa_consonant|ipa_stress","difficulty_note":"âm nào dễ nhầm"}
  ]
}

Tag: dùng "ipa_vowel" nếu từ có vowel khó, "ipa_consonant" nếu consonant khó, "ipa_stress" nếu trọng âm lạ.`;

      } else if (lessonType === "pairs") {
        promptText = `Tạo 8 cặp minimal pairs IELTS band ${profile.currentBand} theo chủ đề "${t}". ${weaknessHint}

Mỗi cặp có 2 từ khác nhau CHỈ 1 ÂM — học viên nghe và chọn đúng từ đã nghe.

JSON format:
{
  "title": "Minimal Pairs: ${t}",
  "items": [
    {"type":"pairs","target":"ship","distractor":"sheep","pair_type":"/ɪ/ vs /iː/","tag":"ipa_vowel_minimal"},
    ...
  ]
}

Ưu tiên các cặp IELTS hay gặp: /ɪ/-/iː/, /æ/-/e/, /θ/-/s/, /ð/-/d/, /v/-/w/, /ʃ/-/s/, /tʃ/-/ʃ/.`;

      } else if (lessonType === "grammar") {
        promptText = `Tạo 8 bài tập ngữ pháp IELTS cho học viên band ${profile.currentBand}. Chủ đề có thể liên quan "${t}". ${weaknessHint}

Trộn các loại:
- 4 items loại "single" chọn đáp án đúng (VD: "The book ___ by the teacher yesterday.")
- 2 items loại "multi_select" (VD: "Những câu nào đúng ngữ pháp?")
- 2 items loại "fill_word" (VD: "___ you ever been to Paris?" — answer: "Have")

JSON format:
{
  "title": "Grammar: ${t}",
  "items": [
    {"type":"single","prompt":"câu có chỗ trống","options":["đáp đúng","sai 1","sai 2","sai 3"],"correct":"đáp đúng","explanation":"giải thích ngắn tiếng Việt","tag":"grammar_tense|grammar_prep|grammar_article|..."},
    {"type":"multi_select","prompt":"Câu nào đúng?","options":[{"text":"...","correct":true},...],"tag":"grammar_..."},
    {"type":"fill_word","prompt":"câu có ___","answer":"word","tag":"grammar_..."}
  ]
}

Tag cụ thể: grammar_tense, grammar_prep, grammar_article, grammar_conditional, grammar_passive, grammar_relative, grammar_comparative.`;
      }

      const r = await callGemini(apiKey, promptText, null, true);
      const data = JSON.parse(r);
      data.id = "ai-" + Date.now();
      data.type = "mixed"; // lesson có nhiều kiểu items
      setLesson(data);
    } catch(e) { alert("Lỗi: " + e.message); }
    setLoading(false);
  };

  if (lesson) return <LessonScreen lesson={lesson} onComplete={onComplete} onQuit={() => setLesson(null)} />;

  return (
    <div className="max-w-xl mx-auto px-6 pt-10">
      <button onClick={onBack} className="mb-6 text-stone-500 flex items-center gap-1 text-sm"><Icon name="chevLeft" className="w-4 h-4" /> Trang chính</button>
      <h1 className="font-display text-4xl font-black mb-2">Bài học AI tạo</h1>
      <p className="text-stone-500 text-sm mb-6">Band {profile.currentBand} · Gemini 2.5 Pro</p>

      {weaknesses.length > 0 && (
        <div className="bg-amber-50 border border-amber-200 rounded-sm p-3 mb-6">
          <p className="text-xs uppercase tracking-widest text-amber-800 mb-1">AI biết điểm yếu của bạn</p>
          <p className="text-sm font-display italic text-amber-900">Sẽ ưu tiên: {weaknesses.slice(0,3).map(w => w.tag).join(", ")}</p>
        </div>
      )}

      <p className="text-xs uppercase tracking-widest text-stone-500 mb-2">Loại bài tập</p>
      <div className="grid grid-cols-2 gap-2 mb-6">
        {[
          {id:"vocab_mixed", label:"Từ vựng hỗn hợp", desc:"Chọn + điền + multi"},
          {id:"ipa_drill", label:"IPA drill", desc:"Phiên âm khó"},
          {id:"pairs", label:"Minimal pairs", desc:"Nghe phân biệt"},
          {id:"grammar", label:"Ngữ pháp", desc:"4 kiểu trộn lẫn"},

          <button key={opt.id} onClick={() => setLessonType(opt.id)} className={`p-3 rounded-sm border-2 text-left transition-all ${lessonType === opt.id ? "bg-stone-900 text-amber-50 border-stone-900" : "bg-white border-stone-200 hover:border-stone-400"}`}>

      {loading ? (
        <div className="text-center py-16">
          <Icon name="sparkle" className="w-12 h-12 text-amber-600 mx-auto mb-4 float-gentle" />
          <p className="font-display italic text-stone-600">Cô đang soạn bài "{topic}"...</p>
          <p className="text-xs text-stone-400 mt-2">Pro chấm kỹ hơn, mất 20-40s</p>
        </div>
      ) : (
        <div className="grid grid-cols-3 gap-2">
          {topics.map(t => (
            <button key={t} onClick={() => gen(t)} className="bg-white border border-stone-200 rounded-sm p-3 ink-shadow hover:border-stone-400 text-left">
              <div className="font-display text-sm font-bold">{t}</div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ============ STORY SCREEN ============
function StoryScreen({ apiKey, profile, onAddFlashcard, onBack, onXp }) {
  const TOPICS = ["Environment","Technology","Education","Work","Travel","Food","Family","Sports","Media","Health","Shopping","City Life","Art","Science"];
  const STORY_TYPES = [
    { id: "funny", label: "Chuyện cười", icon: "😄", desc: "Short jokes, puns, twists", color: "#B45309" },
    { id: "anecdote", label: "Mẩu chuyện thật", icon: "💭", desc: "Real-life story", color: "#0F766E" },
    { id: "fable", label: "Ngụ ngôn", icon: "🦊", desc: "Moral lesson", color: "#7C2D12" },
    { id: "dialogue", label: "Hội thoại hài", icon: "💬", desc: "2-person funny chat", color: "#6D28D9" },
  ];

  const [type, setType] = useState("funny");
  const [topic, setTopic] = useState("");
  const [story, setStory] = useState(ls.get("currentStory", null));
  const [loading, setLoading] = useState(false);
  const [quizAnswered, setQuizAnswered] = useState({});
  const [retellInput, setRetellInput] = useState("");
  const [retellFeedback, setRetellFeedback] = useState(null);
  const [retellLoading, setRetellLoading] = useState(false);
  const [addedWords, setAddedWords] = useState(new Set());
  const [library, setLibrary] = useState(ls.get("storyLibrary", []));
  const [view, setView] = useState("reader"); // reader | library | selector
  const [popup, setPopup] = useState(null); // { text, loading, data }
  const [selectedText, setSelectedText] = useState("");

  // Khởi tạo view dựa trên trạng thái
  useEffect(() => {
    if (!story) setView("selector");
    else setView("reader");
  }, []);

  const generate = async (chosenTopic) => {
    setLoading(true); setTopic(chosenTopic);
    setQuizAnswered({}); setRetellInput(""); setRetellFeedback(null); setAddedWords(new Set());
    setView("reader");
    
    const typeSpec = {
      funny: "Một CHUYỆN CƯỜI ngắn 80-120 từ tiếng Anh. Phải có punchline (câu chốt gây cười) ở cuối. Humor thông minh, không thô.",
      anecdote: "Một MẨU CHUYỆN THẬT 100-150 từ, kể ở ngôi thứ nhất. Có plot twist hoặc ending bất ngờ nhẹ. Giống Reader's Digest.",
      fable: "Một CHUYỆN NGỤ NGÔN 100-140 từ với nhân vật động vật hoặc người. Có bài học đạo đức (moral) rõ ràng ở cuối.",
      dialogue: "Một HỘI THOẠI HÀI giữa 2 người (A và B) 80-120 từ tổng cộng. Format: 'A: ...\\nB: ...'. Có twist hoặc punchline ở cuối."
    }[type];

    // Anti-duplication: lấy tiêu đề + câu đầu của 10 chuyện gần nhất cùng loại+chủ đề
    const sameCategory = library.filter(s => s.type === type && s.topic === chosenTopic).slice(-10);
    const antiDupHint = sameCategory.length > 0
      ? `\n\nQUAN TRỌNG — TRÁNH TRÙNG LẶP. Đã có ${sameCategory.length} chuyện loại "${type}" chủ đề "${chosenTopic}" trước đây:
${sameCategory.map((s, i) => `${i+1}. "${s.title}" — mở đầu: "${s.story.slice(0, 80)}..."`).join("\n")}

Chuyện mới PHẢI có:
- Plot/cốt truyện KHÁC hoàn toàn các chuyện trên
- Nhân vật/setting/twist khác
- Tiêu đề khác
Được phép lặp 1-2 từ vựng từ các chuyện cũ, nhưng ngữ cảnh sử dụng phải khác.`
      : "";

    try {
      const r = await callGemini(apiKey,
        `Tạo 1 câu chuyện tiếng Anh theo yêu cầu:
- Loại: ${type} — ${typeSpec}
- Chủ đề IELTS: ${chosenTopic}
- Band ${profile.currentBand} (từ vựng và cấu trúc phù hợp)
- Phải chứa 5-8 từ vựng/collocations IELTS chủ đề "${chosenTopic}"
- Ngôn ngữ tự nhiên như người bản xứ viết${antiDupHint}

Trả về JSON format chính xác:
{
  "title": "English title ngắn gọn",
  "story": "câu chuyện đầy đủ tiếng Anh",
  "story_vi": "bản dịch tiếng Việt (sát nghĩa, tự nhiên)",
  "punchline_explanation": "giải thích tiếng Việt tại sao đoạn này HÀI/Ý NGHĨA (đặc biệt cho funny và dialogue)",
  "image_emoji": "3-5 emoji đại diện cho scene chính, VD: 🍕🧑‍🍳😂 hoặc 🌳🦊🌙",
  "image_keywords": "2-3 keywords tiếng Anh mô tả hình ảnh chính",
  "scene_description": "1 câu tiếng Anh mô tả cảnh chính",
  "svg_illustration": "1 đoạn SVG code hoàn chỉnh minh họa cảnh chính của chuyện, viewBox='0 0 400 200', phong cách flat illustration, 3-5 màu (ưu tiên warm tones như amber/emerald/stone). Dùng shapes cơ bản (circle, rect, path, polygon). Không dùng external fonts, không dùng <image>. SVG phải là string hợp lệ, KHÔNG escape quotes. Ví dụ: '<svg viewBox=\\\"0 0 400 200\\\" xmlns=\\\"http://www.w3.org/2000/svg\\\"><rect...\\/></svg>'",
  "vocabulary": [
    {"en":"word","ipa":"/ipa/","vi":"nghĩa tiếng việt","usage_in_story":"trích câu trong chuyện có chứa từ này"}
  ],
  "quiz": [
    {"question":"câu hỏi tiếng Anh","options":["A","B","C","D"],"correct":"A","explanation_vi":"giải thích đáp án"}
  ]
}

Quan trọng:
- "vocabulary": 5-8 từ, ưu tiên collocations IELTS band 5.0-6.5
- "quiz": 3 câu — 1 main idea, 1 detail, 1 vocabulary in context
- "punchline_explanation": BẮT BUỘC giải thích tiếng Việt cho funny/dialogue
- "svg_illustration": BẮT BUỘC — SVG vẽ minh họa scene chính, flat style, warm colors. Phải hợp lệ và render được. Nếu không thể sinh SVG tốt thì tạo pattern trừu tượng đẹp với nhiều circle/rect xếp đặt có ý đồ.
- "image_emoji": emoji KHÁC các chuyện cũ nếu có`,
        null, true);
      const data = JSON.parse(r);
      data.id = "story-" + Date.now();
      data.type = type;
      data.topic = chosenTopic;
      data.createdAt = Date.now();
      setStory(data);
      ls.set("currentStory", data);
      // Save to library (keep last 50)
      const newLib = [data, ...library].slice(0, 50);
      setLibrary(newLib);
      ls.set("storyLibrary", newLib);
    } catch(e) { 
      alert("Lỗi tạo chuyện: " + e.message);
    }
    setLoading(false);
  };

  const checkQuiz = (qIdx, answer) => {
    if (quizAnswered[qIdx]) return;
    setQuizAnswered({ ...quizAnswered, [qIdx]: answer });
    if (answer === story.quiz[qIdx].correct) onXp(5);
  };

  const addWord = (w) => {
    if (addedWords.has(w.en)) return;
    onAddFlashcard({ front: w.en, back: `${w.ipa} — ${w.vi}`, type: "vocab_story", tag: `vocab_${story.topic.toLowerCase()}` });
    setAddedWords(new Set([...addedWords, w.en]));
  };

  // TAP-TO-EXPLORE: click vào từ/cụm → gọi AI giải thích
  const explainText = async (text, isSentence = false) => {
    const cleaned = text.replace(/[.,!?;:"']/g, "").trim();
    if (!cleaned || cleaned.length < 1) return;
    setPopup({ text: cleaned, loading: true, data: null, isSentence });
    try {
      // Check pre-defined vocabulary first (nhanh, không tốn API)
      const known = story.vocabulary?.find(v => v.en.toLowerCase() === cleaned.toLowerCase());
      if (known && !isSentence) {
        setPopup({ text: cleaned, loading: false, isSentence: false, data: {
          en: known.en, ipa: known.ipa, vi: known.vi, 
          usage: known.usage_in_story, 
          examples: [], fromVocab: true
        }});
        return;
      }
      // Gọi AI giải thích
      const contextHint = `Trong câu chuyện: "${story.story.slice(0, 200)}..."`;
      const prompt = isSentence
        ? `Giải thích CỤM CÂU sau tiếng Anh cho học viên IELTS band ${profile.currentBand} (người Việt):
"${cleaned}"
${contextHint}

Trả JSON:
{
  "en": "cụm câu gốc",
  "ipa": "/phiên âm IPA của cả cụm (ngăn cách space)/",
  "vi": "dịch tiếng Việt",
  "grammar_note": "cấu trúc ngữ pháp chính (ngắn gọn tiếng Việt)",
  "examples": ["1 ví dụ khác dùng cấu trúc/cụm này"],
  "key_word": "từ quan trọng nhất trong cụm"
}`
        : `Giải thích TỪ sau cho học viên IELTS (người Việt):
"${cleaned}"
${contextHint}

Trả JSON:
{
  "en": "từ gốc",
  "ipa": "/phiên âm chính xác/",
  "vi": "2-3 nghĩa tiếng Việt phổ biến, ngăn cách dấu phẩy",
  "part_of_speech": "n/v/adj/adv/...",
  "usage": "câu chứa từ này trong chuyện (nếu có)",
  "examples": ["1-2 ví dụ khác với từ này"],
  "synonyms": ["2-3 synonym phổ biến"],
  "collocations": ["2 collocations hay dùng (VD: 'make a decision', 'take action')"]
}`;
      const r = await callGemini(apiKey, prompt, null, true);
      const data = JSON.parse(r);
      setPopup({ text: cleaned, loading: false, isSentence, data });
    } catch(e) {
      setPopup({ text: cleaned, loading: false, isSentence, data: { error: e.message } });
    }
  };

  const addPopupToFlashcard = () => {
    if (!popup?.data) return;
    const d = popup.data;
    const front = d.en || popup.text;
    const back = `${d.ipa || ""} — ${d.vi || ""}${d.grammar_note ? " · " + d.grammar_note : ""}`;
    onAddFlashcard({ front, back, type: popup.isSentence ? "phrase" : "vocab_tap", tag: `story_${story.topic.toLowerCase()}` });
    setAddedWords(new Set([...addedWords, front]));
    setPopup(null);
  };

  const checkRetell = async () => {
    if (retellInput.trim().split(/\s+/).length < 20) { alert("Kể lại ít nhất 20 từ"); return; }

      const r = await callGemini(apiKey,

CÂU CHUYỆN GỐC:
${story.story}

PHẦN KỂ LẠI CỦA HỌC VIÊN (${retellInput.trim().split(/\s+/).length} từ):
${retellInput}

Trả về JSON:
{
  "band_estimate": 5.5,
  "content_score": 8,
  "grammar_errors": [{"wrong":"câu sai","correct":"câu đúng","note":"giải thích ngắn tiếng Việt"}],
  "good_phrases": ["cụm từ học viên dùng tốt"],
  "missed_points": ["ý quan trọng học viên bỏ sót"],
  "suggestions_vi": "2-3 gợi ý cải thiện bằng tiếng Việt"
}`,
        null, true);
      setRetellFeedback(JSON.parse(r));
      onXp(20);
    } catch(e) { alert("Lỗi: " + e.message); }
    setRetellLoading(false);
  };

  const newStory = () => {
    setStory(null);
    ls.set("currentStory", null);
    setQuizAnswered({}); setRetellInput(""); setRetellFeedback(null); setAddedWords(new Set());
    setView("selector");
  };

  const openFromLibrary = (s) => {
    setStory(s);
    ls.set("currentStory", s);
    setQuizAnswered({}); setRetellInput(""); setRetellFeedback(null); setAddedWords(new Set());
    setView("reader");
  };

  const deleteFromLibrary = (id) => {
    if (!confirm("Xóa chuyện này khỏi thư viện?")) return;
    const newLib = library.filter(s => s.id !== id);
    setLibrary(newLib);
    ls.set("storyLibrary", newLib);
  };

  // Render story with clickable sentences + words
  // Chia text thành sentences, mỗi sentence thành words
  const renderStory = (text) => {
    if (!text) return null;
    // Split thành paragraphs (bảo vệ hội thoại A:/B:)
    const paragraphs = text.split(/\n+/).filter(p => p.trim());
    return paragraphs.map((para, pIdx) => {
      // Match sentences (ending . ! ?)
      const sentenceRegex = /[^.!?]+[.!?]+|[^.!?]+$/g;
      const sentences = para.match(sentenceRegex) || [para];
      return (
        <div key={pIdx} className="mb-3">
          {sentences.map((sent, sIdx) => {
            const trimmed = sent.trim();
            if (!trimmed) return null;
            // Tách từ, giữ dấu câu và space
            const tokens = trimmed.split(/(\s+|[.,!?;:"])/g).filter(Boolean);
            return (
              <span key={sIdx} className="group relative inline">
                <span className="hover:bg-blue-50 rounded px-0.5 transition-colors">
                  {tokens.map((tok, tIdx) => {
                    const isWord = /[a-zA-Z]/.test(tok);
                    const cleaned = tok.replace(/[^a-zA-Z'-]/g, "");
                    const isVocabWord = story.vocabulary?.some(v => v.en.toLowerCase() === cleaned.toLowerCase());
                    if (!isWord) return <span key={tIdx}>{tok}</span>;
                    return (
                      <span key={tIdx} onClick={(e) => { e.stopPropagation(); explainText(cleaned, false); }}
                        className={`cursor-pointer hover:bg-yellow-200 hover:underline rounded-sm transition-colors ${isVocabWord ? "bg-amber-200/60 font-medium" : ""}`}>
                        {tok}
                      </span>
                    );
                  })}
                </span>
                <button onClick={() => explainText(trimmed, true)} className="opacity-0 group-hover:opacity-100 transition-opacity inline-flex items-center ml-1 text-blue-600 hover:text-blue-800 text-xs align-super" title="Giải thích cả câu">
                  🔍
                </button>
              </span>
            );
          })}
        </div>
      );

            <div className="text-5xl mb-3">📚</div>
            <p className="text-stone-600 font-display italic">Thư viện trống</p>

        ) : (
          <div className="space-y-3">
            {library.map(s => {
              const typeInfo = STORY_TYPES.find(t => t.id === s.type);

                <div key={s.id} className="bg-white border border-stone-200 rounded-sm p-4 ink-shadow">
                  <div className="flex items-start gap-3">
                    {s.svg_illustration ? (
                      <div className="w-16 h-16 flex-shrink-0 rounded-sm overflow-hidden" style={{background: `${typeInfo?.color || "#78716C"}15`}} dangerouslySetInnerHTML={{__html: s.svg_illustration}} />
                    ) : (
                      <div className="text-2xl flex-shrink-0">{s.image_emoji?.split(" ")[0] || typeInfo?.icon}</div>
                    )}

                      <div className="flex items-center gap-2 mb-1 flex-wrap">
                        <span className="text-[10px] px-1.5 py-0.5 rounded uppercase tracking-widest text-white font-bold" style={{background: typeInfo?.color || "#78716C"}}>{typeInfo?.label}</span>
                        <span className="text-[10px] text-stone-500">· {s.topic}</span>
                        <span className="text-[10px] text-stone-400 ml-auto">{new Date(s.createdAt).toLocaleDateString("vi-VN")}</span>
                      </div>
                      <h3 className="font-display font-bold truncate">{s.title}</h3>
                      <p className="text-xs text-stone-500 line-clamp-2 mt-1">{s.story.slice(0, 120)}...</p>
                      <div className="flex gap-2 mt-3">
                        <button onClick={() => openFromLibrary(s)} className="flex-1 bg-stone-900 text-amber-50 py-1.5 rounded-sm text-xs font-bold hover:bg-stone-800">Mở đọc</button>
                        <button onClick={() => deleteFromLibrary(s.id)} className="px-3 py-1.5 text-xs text-stone-400 hover:text-rose-700">Xóa</button>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  if (!story && !loading) {
    return (
      <div className="max-w-xl mx-auto px-6 pt-10">
        <button onClick={onBack} className="mb-6 text-stone-500 flex items-center gap-1 text-sm"><Icon name="chevLeft" className="w-4 h-4" /> Trang chính</button>
        <div className="flex items-start justify-between mb-2">
          <h1 className="font-display text-4xl font-black">Chuyện kể mỗi ngày</h1>
          {library.length > 0 && (
            <button onClick={() => setView("library")} className="text-xs uppercase tracking-widest text-stone-600 hover:text-stone-900 border border-stone-300 rounded-sm px-3 py-2 whitespace-nowrap">
              📚 Thư viện ({library.length})
            </button>
          )}

        <p className="text-xs uppercase tracking-widest text-stone-500 mb-2">Loại chuyện</p>
        <div className="grid grid-cols-2 gap-2 mb-6">

            <button key={s.id} onClick={() => setType(s.id)} className={`p-4 rounded-sm border-2 text-left transition-all ${type === s.id ? "text-amber-50 border-stone-900" : "bg-white border-stone-200 hover:border-stone-400"}`}
              style={{ background: type === s.id ? s.color : undefined }}>
              <div className="text-2xl mb-1">{s.icon}</div>

              <div className="text-xs opacity-70">{s.desc}</div>

              <button key={t} onClick={() => generate(t)} className="bg-white border border-stone-200 rounded-sm p-3 ink-shadow hover:border-stone-400 text-left relative">

  if (loading) {

      <div className="max-w-xl mx-auto px-6 pt-10">
