      <div className="mb-6">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-xs px-2 py-0.5 rounded-sm uppercase tracking-widest text-white font-bold" style={{background: STORY_TYPES.find(t => t.id === story.type)?.color || "#78716C"}}>
            {STORY_TYPES.find(t => t.id === story.type)?.icon} {STORY_TYPES.find(t => t.id === story.type)?.label}
          </span>
          <span className="text-xs text-stone-500">· {story.topic}</span>
        </div>
        <h1 className="font-display text-3xl font-black leading-tight">{story.title}</h1>
      </div>

      {/* Hero scene: SVG ưu tiên, fallback emoji */}
      {(story.svg_illustration || story.image_emoji) && (
        <div className="relative mb-4 rounded-sm overflow-hidden ink-shadow" style={{background: `linear-gradient(135deg, ${STORY_TYPES.find(t=>t.id===story.type)?.color || "#78716C"}22, ${STORY_TYPES.find(t=>t.id===story.type)?.color || "#78716C"}05)`}}>
          {story.svg_illustration ? (
            <div className="story-svg aspect-[2/1] flex items-center justify-center p-3" dangerouslySetInnerHTML={{__html: story.svg_illustration}} />
          ) : (
            <div className="aspect-[5/2] flex items-center justify-center text-center p-6">
              <div>
                <div className="text-7xl mb-2 tracking-wider">{story.image_emoji}</div>
                {story.image_keywords && <p className="text-[10px] uppercase tracking-widest text-stone-500 italic">{story.image_keywords}</p>}
              </div>
            </div>
          )}
          {story.svg_illustration && story.image_keywords && (
            <div className="absolute bottom-2 right-3 text-[10px] uppercase tracking-widest text-stone-500 italic bg-white/70 rounded px-2 py-0.5 backdrop-blur">{story.image_keywords}</div>
          )}
        </div>
      )}

      <div className="bg-blue-50 border border-blue-200 rounded-sm p-3 mb-3 text-xs text-blue-900">
        💡 <b>Mẹo:</b> Chạm vào bất kỳ <u>từ</u> nào để xem phiên âm + nghĩa. Hover câu và bấm 🔍 để giải thích <u>cả câu</u>.
      </div>

      <div className="bg-white border border-stone-200 rounded-sm p-6 ink-shadow mb-4">
        <button onClick={() => speak(story.story, 0.85)} className="mb-4 inline-flex items-center gap-2 text-stone-600 hover:text-stone-900 text-sm"><Icon name="volume" className="w-4 h-4" /> Nghe kể chuyện</button>
        <div className="font-display text-lg leading-relaxed text-stone-800 select-text">
          {renderStory(story.story)}
        </div>
      </div>

      {/* TAP POPUP */}
      {popup && (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/40" onClick={() => setPopup(null)}>
          <div className="bg-white w-full sm:max-w-md rounded-t-xl sm:rounded-sm ink-shadow max-h-[85vh] overflow-y-auto slide-up" onClick={e => e.stopPropagation()}>
            <div className="sticky top-0 bg-white border-b border-stone-200 p-4 flex items-start justify-between gap-3">
              <div className="flex-1 min-w-0">
                <p className="text-[10px] uppercase tracking-widest text-stone-500 mb-1">{popup.isSentence ? "Cụm câu" : "Từ"}</p>
                <div className="font-display text-2xl font-bold break-words">{popup.text}</div>
              </div>
              <button onClick={() => setPopup(null)} className="text-stone-400 hover:text-stone-900"><Icon name="x" className="w-5 h-5" /></button>
            </div>
            <div className="p-4">
              {popup.loading && (
                <div className="text-center py-6"><Icon name="sparkle" className="w-8 h-8 text-amber-600 mx-auto mb-2 float-gentle" /><p className="text-sm text-stone-500 italic">Đang giải thích...</p></div>
              )}
              {!popup.loading && popup.data?.error && (
                <div className="bg-rose-50 p-3 rounded-sm text-sm text-rose-800">Lỗi: {popup.data.error}</div>
              )}
              {!popup.loading && popup.data && !popup.data.error && (
                <div className="space-y-3">
                  <div className="flex items-center gap-2">
                    <button onClick={() => speak(popup.data.en || popup.text)} className="bg-stone-900 text-amber-50 px-4 py-2 rounded-sm text-sm flex items-center gap-2"><Icon name="volume" className="w-4 h-4" /> Nghe</button>
                    {popup.data.ipa && <div className="font-mono text-amber-700">{popup.data.ipa}</div>}
                    {popup.data.part_of_speech && <span className="text-[10px] uppercase px-1.5 py-0.5 rounded bg-stone-100 text-stone-600">{popup.data.part_of_speech}</span>}
                  </div>
                  {popup.data.vi && (
                    <div className="bg-amber-50 border border-amber-200 rounded-sm p-3">
                      <p className="text-[10px] uppercase tracking-widest text-amber-700 font-bold mb-1">Nghĩa</p>
                      <p className="text-stone-800">{popup.data.vi}</p>
                    </div>
                  )}
                  {popup.data.grammar_note && (
                    <div className="bg-blue-50 border border-blue-200 rounded-sm p-3">
                      <p className="text-[10px] uppercase tracking-widest text-blue-700 font-bold mb-1">Ngữ pháp</p>
                      <p className="text-sm text-blue-900 italic">{popup.data.grammar_note}</p>
                    </div>
                  )}
                  {popup.data.usage && !popup.data.fromVocab && (
                    <div className="text-xs text-stone-500 italic border-l-2 border-stone-300 pl-3">Trong chuyện: "{popup.data.usage}"</div>
                  )}
                  {popup.data.examples?.length > 0 && (
                    <div>
                      <p className="text-[10px] uppercase tracking-widest text-stone-500 font-bold mb-1">Ví dụ</p>
                      <ul className="text-sm space-y-1">
                        {popup.data.examples.map((ex, i) => <li key={i} className="italic text-stone-700 flex items-start gap-2">"{ex}" <button onClick={() => speak(ex)} className="text-stone-400 hover:text-stone-700 flex-shrink-0"><Icon name="volume" className="w-3 h-3" /></button></li>)}
                      </ul>
                    </div>
                  )}
                  {popup.data.synonyms?.length > 0 && (
                    <div className="text-sm"><span className="text-[10px] uppercase tracking-widest text-stone-500 font-bold">Synonyms: </span><span className="text-stone-700">{popup.data.synonyms.join(", ")}</span></div>
                  )}
                  {popup.data.collocations?.length > 0 && (
                    <div className="text-sm"><span className="text-[10px] uppercase tracking-widest text-stone-500 font-bold">Collocations: </span><span className="text-stone-700 italic">{popup.data.collocations.join(" · ")}</span></div>
                  )}
                </div>
              )}
            </div>
            {!popup.loading && popup.data && !popup.data.error && (
              <div className="sticky bottom-0 bg-white border-t border-stone-200 p-3">
                <button onClick={addPopupToFlashcard} className="w-full bg-amber-700 text-amber-50 py-2.5 rounded-sm font-bold text-sm hover:bg-amber-800">+ Thêm vào Flashcards</button>
              </div>
            )}
          </div>
        </div>
      )}

      <details className="mb-4 bg-stone-50 border border-stone-200 rounded-sm">
        <summary className="cursor-pointer p-4 font-display font-bold text-sm select-none hover:bg-stone-100">📖 Xem bản dịch tiếng Việt</summary>
        <div className="px-4 pb-4 text-stone-700 italic leading-relaxed" style={{whiteSpace: "pre-wrap"}}>{story.story_vi}</div>
      </details>

      {story.punchline_explanation && (story.type === "funny" || story.type === "dialogue") && (
        <details className="mb-4 bg-amber-50 border border-amber-200 rounded-sm">
          <summary className="cursor-pointer p-4 font-display font-bold text-sm select-none text-amber-900 hover:bg-amber-100">💡 Giải thích điểm hài</summary>
          <div className="px-4 pb-4 text-amber-900 italic leading-relaxed">{story.punchline_explanation}</div>
        </details>
      )}

      <div className="mb-6">
        <h3 className="font-display text-xl font-bold mb-3">Từ vựng trong chuyện</h3>
        <div className="space-y-2">
          {story.vocabulary?.map((w, i) => {
            const added = addedWords.has(w.en);
            return (
              <div key={i} className="bg-white border border-stone-200 rounded-sm p-3 ink-shadow">
                <div className="flex items-start justify-between gap-2 mb-1">
                  <div className="flex-1">
                    <div className="flex items-baseline gap-2 flex-wrap">
                      <span className="font-display font-black text-lg">{w.en}</span>
                      <span className="font-mono text-amber-700 text-sm">{w.ipa}</span>
                      <button onClick={() => speak(w.en)} className="text-stone-400 hover:text-stone-700"><Icon name="volume" className="w-3 h-3" /></button>
                    </div>
                    <div className="text-sm text-stone-700">{w.vi}</div>
                    {w.usage_in_story && <div className="text-xs text-stone-500 italic mt-1">"{w.usage_in_story}"</div>}
                  </div>
                  <button onClick={() => addWord(w)} disabled={added} className={`text-xs px-2 py-1 rounded-sm border whitespace-nowrap ${added ? "bg-emerald-50 border-emerald-300 text-emerald-700" : "bg-white border-stone-300 hover:border-stone-600"}`}>
                    {added ? "✓ Đã thêm" : "+ Flashcard"}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {story.quiz?.length > 0 && (
        <div className="mb-6">
          <h3 className="font-display text-xl font-bold mb-3">Bài tập hiểu bài</h3>
          <div className="space-y-4">
            {story.quiz.map((q, qIdx) => {
              const userAns = quizAnswered[qIdx];
              const isAnswered = !!userAns;
              return (
                <div key={qIdx} className="bg-white border border-stone-200 rounded-sm p-4 ink-shadow">
                  <p className="font-display font-bold mb-3">{qIdx + 1}. {q.question}</p>
                  <div className="space-y-2">
                    {q.options.map((opt, oIdx) => {
                      const letter = String.fromCharCode(65 + oIdx);
                      const isSel = userAns === letter;
                      const isRight = isAnswered && letter === q.correct;
                      const isWrong = isAnswered && isSel && !isRight;
                      return (
                        <button key={oIdx} onClick={() => checkQuiz(qIdx, letter)} disabled={isAnswered} className={`w-full p-3 rounded-sm text-left text-sm border-2 transition-all ${
                          isRight ? "bg-emerald-600 text-white border-emerald-700" :
                          isWrong ? "bg-rose-100 text-rose-900 border-rose-600" :
                          isSel ? "bg-stone-800 text-white" :
                          "bg-white border-stone-200 hover:border-stone-400"
                        }`}>
                          <span className="font-bold mr-2">{letter}.</span>{opt}
                        </button>
                      );
                    })}
                  </div>
                  {isAnswered && q.explanation_vi && (
                    <div className="mt-2 text-xs text-stone-600 italic pt-2 border-t border-stone-200">💡 {q.explanation_vi}</div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="mb-6">
        <h3 className="font-display text-xl font-bold mb-2">Kể lại bằng lời của bạn</h3>
        <p className="text-xs text-stone-500 mb-3 italic">Luyện Speaking Part 2 "Describe a time..." — AI chấm</p>
        <textarea value={retellInput} onChange={e => setRetellInput(e.target.value)} placeholder="Retell the story in your own words..." disabled={!!retellFeedback} className="w-full min-h-[120px] p-3 border border-stone-300 rounded-sm text-sm focus:outline-none focus:border-stone-700 disabled:bg-stone-50" />
        <div className="flex items-center justify-between mt-2">
          <span className="text-xs text-stone-500">{retellInput.trim().split(/\s+/).filter(Boolean).length} từ</span>
          {!retellFeedback && <button onClick={checkRetell} disabled={retellLoading || retellInput.trim().split(/\s+/).length < 20} className="bg-stone-900 text-amber-50 px-4 py-2 rounded-sm text-sm font-bold disabled:opacity-50">
            {retellLoading ? "Đang chấm..." : "Nhờ cô chấm"}
          </button>}
        </div>
        
        {retellFeedback && (
          <div className="mt-4 space-y-3 slide-up">
            <div className="bg-stone-900 text-amber-50 p-4 rounded-sm text-center">
              <p className="text-xs uppercase tracking-widest text-amber-400/70">Band ước tính cho phần kể lại</p>
              <div className="font-display text-4xl font-black">{retellFeedback.band_estimate}</div>
            </div>
            {retellFeedback.good_phrases?.length > 0 && (
              <div className="bg-emerald-50 border border-emerald-200 rounded-sm p-3">
                <p className="text-xs uppercase tracking-widest text-emerald-800 font-bold mb-1">Cụm dùng tốt</p>
                <div className="text-sm text-emerald-900 italic">{retellFeedback.good_phrases.map(p => `"${p}"`).join(", ")}</div>
              </div>
            )}
            {retellFeedback.grammar_errors?.length > 0 && (
              <div className="bg-rose-50 border border-rose-200 rounded-sm p-3">
                <p className="text-xs uppercase tracking-widest text-rose-800 font-bold mb-2">Lỗi cần sửa</p>
                <div className="space-y-2">
                  {retellFeedback.grammar_errors.map((e, i) => (
                    <div key={i} className="text-sm">
                      <div><s className="text-rose-700">{e.wrong}</s> → <b className="text-emerald-700">{e.correct}</b></div>
                      <div className="text-xs text-stone-600 italic">{e.note}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {retellFeedback.missed_points?.length > 0 && (
              <div className="bg-amber-50 border border-amber-200 rounded-sm p-3">
                <p className="text-xs uppercase tracking-widest text-amber-800 font-bold mb-1">Ý bị bỏ sót</p>
                <ul className="text-sm text-amber-900 list-disc list-inside">
                  {retellFeedback.missed_points.map((p, i) => <li key={i}>{p}</li>)}
                </ul>
              </div>
            )}
            {retellFeedback.suggestions_vi && (
              <div className="bg-blue-50 border border-blue-200 rounded-sm p-3">
                <p className="text-xs uppercase tracking-widest text-blue-800 font-bold mb-1">Gợi ý từ cô</p>
                <p className="text-sm text-blue-900 font-display italic" style={{whiteSpace:"pre-wrap"}}>{retellFeedback.suggestions_vi}</p>
              </div>
            )}
            <button onClick={() => { setRetellFeedback(null); setRetellInput(""); }} className="w-full bg-white border border-stone-300 py-2 rounded-sm text-sm hover:border-stone-500">Kể lại lần nữa</button>
          </div>
        )}
      </div>

      <button onClick={newStory} className="w-full bg-stone-900 text-amber-50 py-3 rounded-sm font-display font-bold hover:bg-stone-800">Chuyện mới</button>
    </div>
  );
}

// ============ STATS ============
function StatsScreen({ profile, flashcards, onBack }) {
  const totalLessons = CURRICULUM.reduce((s,u) => s + u.lessons.length, 0);
  const done = Object.keys(profile.completedLessons).length;
  const byBand = CURRICULUM.filter(u => u.lessons.length > 0).map(u => ({
    band: u.band, total: u.lessons.length,
    done: u.lessons.filter(l => profile.completedLessons[l.id]).length, color: u.color
  }));
  return (
    <div className="max-w-xl mx-auto px-6 pt-10">
      <button onClick={onBack} className="mb-6 text-stone-500 flex items-center gap-1 text-sm"><Icon name="chevLeft" className="w-4 h-4" /> Trang chính</button>
      <h1 className="font-display text-4xl font-black mb-10">Thống kê</h1>
      <div className="grid grid-cols-2 gap-3 mb-8">
        <div className="bg-white border border-stone-200 rounded-sm p-4 ink-shadow"><Icon name="star" className="w-5 h-5 text-emerald-700 mb-2" /><div className="font-display text-3xl font-black">{profile.xp}</div><div className="text-xs text-stone-500 uppercase">Tổng XP</div></div>
        <div className="bg-white border border-stone-200 rounded-sm p-4 ink-shadow"><Icon name="flame" className="w-5 h-5 text-amber-600 mb-2" /><div className="font-display text-3xl font-black">{profile.streak} ngày</div><div className="text-xs text-stone-500 uppercase">Streak</div></div>
        <div className="bg-white border border-stone-200 rounded-sm p-4 ink-shadow"><Icon name="check" className="w-5 h-5 text-stone-600 mb-2" /><div className="font-display text-3xl font-black">{done}</div><div className="text-xs text-stone-500 uppercase">Bài xong</div></div>
        <div className="bg-white border border-stone-200 rounded-sm p-4 ink-shadow"><Icon name="layers" className="w-5 h-5 text-stone-600 mb-2" /><div className="font-display text-3xl font-black">{flashcards.length}</div><div className="text-xs text-stone-500 uppercase">Flashcards</div></div>
      </div>
      <h2 className="font-display text-2xl font-bold mb-4">Theo band</h2>
      <div className="space-y-3">
        {byBand.map(b => (
          <div key={b.band} className="bg-white border border-stone-200 rounded-sm p-4 ink-shadow">
            <div className="flex justify-between mb-2"><span className="font-display font-bold">Band {b.band}</span><span className="text-sm text-stone-600">{b.done}/{b.total}</span></div>
            <div className="h-2 bg-stone-100 rounded-full overflow-hidden"><div className="h-full transition-all" style={{width:`${b.total?(b.done/b.total)*100:0}%`, background:b.color}} /></div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ============ SETTINGS ============
function SettingsScreen({ apiKey, onSaveKey, profile, onSaveProfile, onBack }) {
  const [key, setKey] = useState(apiKey);
  const [band, setBand] = useState(profile.currentBand);
  return (
    <div className="max-w-xl mx-auto px-6 pt-10">
      <button onClick={onBack} className="mb-6 text-stone-500 flex items-center gap-1 text-sm"><Icon name="chevLeft" className="w-4 h-4" /> Trang chính</button>
      <h1 className="font-display text-4xl font-black mb-8">Cài đặt</h1>
      <div className="bg-white border border-stone-200 rounded-sm p-5 ink-shadow mb-4">
        <label className="text-xs tracking-widest uppercase text-stone-500">Gemini API Key</label>
        <input type="password" value={key} onChange={e => setKey(e.target.value)} className="w-full px-3 py-2 border border-stone-300 rounded-sm font-mono text-sm mt-2 mb-2" />
        <button onClick={() => { onSaveKey(key); alert("Đã lưu"); }} className="bg-stone-900 text-amber-50 px-4 py-2 rounded-sm text-sm">Lưu</button>
      </div>
      <div className="bg-white border border-stone-200 rounded-sm p-5 ink-shadow mb-4">
        <label className="text-xs tracking-widest uppercase text-stone-500">Band hiện tại (để AI điều chỉnh độ khó)</label>
        <div className="flex gap-2 mt-2 flex-wrap">
          {["3.0","3.5","4.0","4.5","5.0","5.5","6.0","6.5","7.0"].map(b => (
            <button key={b} onClick={() => { setBand(b); onSaveProfile({currentBand:b}); }} className={`px-3 py-2 rounded-sm text-sm ${band===b?"bg-stone-900 text-amber-50":"bg-stone-100 hover:bg-stone-200"}`}>{b}</button>
          ))}
        </div>
      </div>
      <div className="bg-rose-50 border border-rose-200 rounded-sm p-5">
        <h3 className="font-display font-bold text-rose-900 mb-2">Xóa dữ liệu</h3>
        <p className="text-sm text-rose-900 mb-3">Xóa toàn bộ tiến độ học, flashcards, lịch sử chat.</p>
        <button onClick={() => { if (confirm("Chắc chắn xóa hết?")) { localStorage.clear(); location.reload(); } }} className="bg-rose-700 text-white px-4 py-2 rounded-sm text-sm">Xóa tất cả</button>
      </div>
    </div>
  );
}

// ============ BOTTOM NAV ============
function BottomNav({ screen, setScreen, due }) {
  if (["lesson","complete","setup"].includes(screen)) return null;
  const items = [
    { id:"home", icon:"home", label:"Chính" },
    { id:"map", icon:"layers", label:"Bài học" },
    { id:"chat", icon:"chat", label:"Chat" },
    { id:"review", icon:"rotate", label:"Ôn", badge: due },
    { id:"stats", icon:"bar", label:"Tiến độ" },
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 bg-stone-50/95 backdrop-blur border-t border-stone-300 z-10">
      <div className="max-w-xl mx-auto grid grid-cols-5">
        {items.map(i => {
          const active = screen === i.id;
          return (
            <button key={i.id} onClick={() => setScreen(i.id)} className={`py-3 flex flex-col items-center gap-0.5 relative ${active?"text-stone-900":"text-stone-400 hover:text-stone-700"}`}>
              <Icon name={i.icon} className="w-5 h-5" />
              <span className={`text-[10px] tracking-wider uppercase ${active?"font-bold":""}`}>{i.label}</span>
              {i.badge > 0 && <span className="absolute top-2 right-1/4 bg-amber-700 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{i.badge}</span>}
              {active && <div className="absolute top-0 left-1/4 right-1/4 h-0.5 bg-stone-900" />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ============ MOUNT ============
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
